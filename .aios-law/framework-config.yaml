      title: "Pesquisadora Jurídica"
      icon: "🔍"
      file: "researcher.md"

    - id: civil
      name: "Dr. Cívil"
      title: "Advogado Civilista"
      icon: "⚖️"
      file: "civil.md"

    - id: labor
      name: "Dra. Clara"
      title: "Advogada Trabalhista"
      icon: "👷"
      file: "labor.md"

    - id: criminal
      name: "Dr. Defensor"
      title: "Advogado Penalista"
      icon: "🛡️"
