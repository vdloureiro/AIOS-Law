# ─────────────────────────────────────────────────────────────────────
# AIOS-Law Framework Configuration (Level 1 — Read-Only)
# Override values in project-config.yaml or local-config.yaml
# ─────────────────────────────────────────────────────────────────────

metadata:
  name: "AIOS-Law"
  version: "1.0.0"
  description: "AI-Orchestrated System for Legal Practice"
  license: "MIT"
  minNodeVersion: "18.0.0"

# ─── Resource Locations ──────────────────────────────────────────────

paths:
  agents: ".aios-law/law-practice/agents"
  agentTeams: ".aios-law/law-practice/agent-teams"
  tasks: ".aios-law/law-practice/tasks"
  templates: ".aios-law/law-practice/templates"
  workflows: ".aios-law/law-practice/workflows"
  checklists: ".aios-law/law-practice/checklists"
  elicitation: ".aios-law/elicitation"
  hooks: ".aios-law/hooks"
  schemas: ".aios-law/schemas"
  data: ".aios-law/data"
  scripts: ".aios-law/scripts"
  utils: ".aios-law/utils"
  cases: "docs/cases"
  knowledgeBase: "docs/knowledge-base"

# ─── Agent Registry ──────────────────────────────────────────────────

