description: "Squad especializado em Direito Previdenciário — aposentadorias, benefícios, revisões, BPC/LOAS"
author: "AIOS-Law"
license: MIT

aios:
  minVersion: "1.0.0"
  type: squad
  domain: law

jurisdiction:
  country: "BR"
  areas:
    - previdenciario
    - aposentadoria
    - beneficios-inss
    - bpc-loas
    - revisao-beneficio

