name: "squad-familia"
version: 1.0.0
description: "Squad especializado em Direito de Família e Sucessões — divórcio, guarda, alimentos, inventário, testamento"
author: "AIOS-Law"
license: MIT

aios:
  minVersion: "1.0.0"
  type: squad
  domain: law

jurisdiction:
  country: "BR"
  areas:
    - familia
    - sucessoes
    - alimentos
    - guarda
    - inventario
    - adocao

components:
