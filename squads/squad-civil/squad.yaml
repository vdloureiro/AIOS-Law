name: "squad-civil"
version: 1.0.0
description: "Squad especializado em Direito Civil — contratos, família, consumidor, responsabilidade civil, sucessões"
author: "AIOS-Law"
license: MIT

aios:
  minVersion: "1.0.0"
  type: squad
  domain: law

jurisdiction:
  country: "BR"
  areas:
    - civil
    - consumidor
    - familia
    - sucessoes
    - responsabilidade-civil
    - contratos
    - direitos-reais

components:
  agents:
    - agents/civil.md
    - agents/researcher.md
    - agents/reviewer.md
  tasks:
    - tasks/*.md
  workflows:
    - workflows/*.yaml
  templates:
    - templates/*.md
  checklists:
    - checklists/*.md

dependencies: []

keywords:
  - aios-law
  - squad
  - civil
  - contratos
  - familia
  - consumidor
