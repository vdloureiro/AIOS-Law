name: "squad-bancario"
version: 1.0.0
description: "Squad especializado em Direito Bancário e Financeiro — revisional, juros, alienação fiduciária, mercado de capitais"
author: "AIOS-Law"
license: MIT

aios:
  minVersion: "1.0.0"
  type: squad
  domain: law

jurisdiction:
  country: "BR"
  areas:
    - bancario
    - financeiro
    - mercado-capitais
    - alienacao-fiduciaria
    - contratos-bancarios

components:
  agents:
    - agents/banking.md
    - agents/consumer.md
    - agents/researcher.md
    - agents/reviewer.md
  tasks:
    - tasks/*.md
  workflows:
    - workflows/*.yaml
  templates:
    - templates/*.md
  checklists:
    - checklists/*.md

dependencies: []

keywords:
  - aios-law
  - squad
  - bancario
  - financeiro
  - bancos
