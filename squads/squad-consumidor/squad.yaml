name: "squad-consumidor"
version: 1.0.0
description: "Squad especializado em Direito do Consumidor — relações de consumo, vícios, práticas abusivas, superendividamento"
author: "AIOS-Law"
license: MIT

aios:
  minVersion: "1.0.0"
  type: squad
  domain: law

jurisdiction:
  country: "BR"
  areas:
    - consumidor
    - relacoes-consumo
    - praticas-abusivas
    - superendividamento

components:
