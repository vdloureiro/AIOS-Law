name: "squad-trabalhista"
version: 1.0.0
description: "Squad especializado em Direito do Trabalho — reclamações, defesas, cálculos trabalhistas, CLT"
author: "AIOS-Law"
license: MIT

aios:
  minVersion: "1.0.0"
  type: squad
  domain: law

jurisdiction:
  country: "BR"
  areas:
    - trabalhista
    - previdenciario
    - acidente-trabalho

components:
  agents:
    - agents/labor.md
    - agents/researcher.md
    - agents/reviewer.md
  tasks:
    - tasks/*.md
  workflows:
    - workflows/*.yaml
  templates:
    - templates/*.md
  checklists:
    - checklists/*.md

dependencies: []

keywords:
  - aios-law
  - squad
  - trabalhista
  - clt
  - tst
